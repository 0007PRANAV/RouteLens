<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteLens - Smart Commute Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>🗺️ RouteLens</h1>
        <p>Smart Commute Optimizer</p>
    </nav>

    <div class="container">
        <div class="hero">
            <h2>Find Your Perfect Route</h2>
            <p>Compare costs, time, and environmental impact</p>
        </div>

        <div class="search-card">
            <h3>Plan Your Journey</h3>
            <form id="routeForm">
                <div class="form-group">
                    <label>From</label>
                    <input type="text" id="fromLocation" placeholder="Enter starting point" required>
                </div>

                <div class="form-group">
                    <label>To</label>
                    <input type="text" id="toLocation" placeholder="Enter destination" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="travelDate" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="travelTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Transport Modes</label>
                    <div class="checkbox-group">
                        <label class="checkbox"><input type="checkbox" value="driving" checked> 🚗 Driving</label>
                        <label class="checkbox"><input type="checkbox" value="transit" checked> 🚌 Transit</label>
                        <label class="checkbox"><input type="checkbox" value="cycling" checked> 🚴 Cycling</label>
                        <label class="checkbox"><input type="checkbox" value="walking" checked> 🚶 Walking</label>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Find Routes</button>
            </form>
        </div>

        <div id="results" class="hidden">
            <h3>Available Routes</h3>
            <div id="routesList" class="routes-list"></div>
        </div>

        <div id="routeDetails" class="hidden details-section">
            <h3>Route Details</h3>
            <div id="detailsContainer" class="details-grid"></div>
        </div>

        <div class="analytics-section">
            <h3>Your Stats</h3>
            <div class="analytics-grid">
                <div class="card">
                    <h4>Total Distance</h4>
                    <p id="totalDistance">0 km</p>
                </div>
                <div class="card">
                    <h4>Money Saved</h4>
                    <p id="moneySaved">$0</p>
                </div>
                <div class="card">
                    <h4>CO₂ Saved</h4>
                    <p id="co2Saved">0 kg</p>
                </div>
                <div class="card">
                    <h4>Favorite Mode</h4>
                    <p id="favoriteRoute">-</p>
                </div>
            </div>
        </div>
    </div>
